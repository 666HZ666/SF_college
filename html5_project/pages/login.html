<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<header>
    <div class="container nav-wrap">
        <div class="logo">🍜 美食分享家</div>
        <ul class="nav-list">
            <li><a href="../index.html">首页</a></li>
            <li><a href="login.html" class="active">登录</a></li>
            <li><a href="register.html">注册</a></li>
        </ul>
    </div>
</header>

<div class="form-container">
    <h2 class="form-title">用户登录</h2>
    <form id="loginForm">
        <div class="form-item">
            <label>用户名</label>
            <input type="text" id="loginUser" placeholder="请输入用户名" required>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">登录</button>
        <div class="form-tip">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </form>
</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
