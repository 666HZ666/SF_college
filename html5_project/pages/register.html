<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<header>
    <div class="container nav-wrap">
        <div class="logo">🍜 美食分享家</div>
        <ul class="nav-list">
            <li><a href="../index.html">首页</a></li>
            <li><a href="login.html">登录</a></li>
            <li><a href="register.html" class="active">注册</a></li>
        </ul>
    </div>
</header>

<div class="form-container">
    <h2 class="form-title">用户注册</h2>
    <form id="regForm">
        <div class="form-item">
            <label>用户名</label>
            <input type="text" id="username" placeholder="3-12位中英文/数字" required>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="6-18位密码" required>
        </div>
        <div class="form-item">
            <label>手机号</label>
            <input type="text" id="phone" placeholder="请输入手机号" required>
        </div>
        <div class="form-item">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">注册</button>
        <div class="form-tip">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </form>
</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
