    <div class="q-item">
        <p class="q">Q：火锅涮菜先后顺序有讲究吗？</p>
        <p class="a">A：建议先涮肉类提鲜，再涮素菜，最后煮主食，口感与汤底味道最佳。</p>
    </div>
    <div class="q-item">
        <p class="q">Q：小龙虾哪些部位不能吃？</p>
        <p class="a">A：虾头内脏、虾腮、虾线需要全部去除，仅食用虾肉与虾黄即可。</p>
    </div>
    <div class="q-item">
        <p class="q">Q：自制奶茶如何减少糖分摄入？</p>
        <p class="a">A：使用天然果糖、蜂蜜替代精制白糖，选择无糖茶叶基底，少加糖浆配料。</p>
    </div>
    <div class="q-item">
        <p class="q">Q：烧烤怎样烤制不容易上火？</p>
        <p class="a">A：减少重油重盐调料，多搭配蔬菜同食，烤制时间不宜过长，搭配清热饮品。</p>
    </div>
