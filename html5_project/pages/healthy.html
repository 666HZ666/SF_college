    <h3 class="healthy-tit">一日三餐饮食原则</h3>
    <p class="healthy-text">早餐注重营养搭配，以蛋白质、粗粮为主；午餐荤素均衡，保证日常能量供给；晚餐清淡少油，减少肠胃消化负担，养成规律进餐习惯。</p>

    <h3 class="healthy-tit">食材健康挑选技巧</h3>
    <p class="healthy-text">优先选择应季新鲜蔬果，减少腌制、油炸、高糖食品摄入，日常多喝水，少喝含糖饮品，合理控制油脂与盐分摄入量。</p>

    <h3 class="healthy-tit">养生家常美食推荐</h3>
    <p class="healthy-text">清炒时蔬、杂粮粥、清蒸肉类、菌菇汤等美食，低脂健康易消化，兼顾美味与养生，适合全年龄段人群食用。</p>
