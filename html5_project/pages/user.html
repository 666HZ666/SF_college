<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 美食分享系统</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .user-box{width:500px;margin:70px auto;background:#fff;padding:50px;border-radius:15px;text-align:center;box-shadow:0 5px 30px rgba(0,0,0,0.1);}
        .user-icon{font-size:80px;color:#ff6b35;margin-bottom:20px;}
        .user-name{font-size:22px;margin-bottom:30px;}
    </style>
</head>
<body>
<header>
    <div class="container nav-wrap">
        <div class="logo">🍜 美食分享家</div>
        <ul class="nav-list">
            <li><a href="../index.html">首页</a></li>
            <li><a href="category.html">美食分类</a></li>
            <li><a href="strategy.html">美食攻略</a></li>
            <li><a href="share.html">分享美食</a></li>
            <li><a href="login.html">登录</a></li>
            <li><a href="register.html">注册</a></li>
            <li><a href="user.html" class="active">个人中心</a></li>
        </ul>
    </div>
</header>

<div class="user-box">
    <div class="user-icon">👤</div>
    <div class="user-name">个人中心</div>
    <a href="share.html" class="btn">发布美食</a>
    <a href="javascript:;" id="logout" class="btn">退出登录</a>
    <div id="myShare" style="margin-top:30px;text-align:left"></div>
</div>

<script>
// 加载我的分享
let share = JSON.parse(localStorage.getItem('shareList')||'[]');
let html = '';
share.forEach(item=>{
    html+=`<div style="padding:10px;border-bottom:1px solid #eee"><h4>${item.name}</h4><p>${item.content}</p><small>${item.time}</small></div>`;
})
document.getElementById('myShare').innerHTML = html || '<p>暂无分享</p>';
</script>

<footer>
    美食分享系统 © 2025 HTML5期末大作业 | 纯原生开发
</footer>

<script src="../js/jquery.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
