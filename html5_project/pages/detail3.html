    <h3 class="detail-title">手作奶茶</h3>
    
    <div class="detail-section">
        <h4>美食简介</h4>
        <p>奶茶起源于中国台湾，是将茶叶冲泡后与牛奶、糖混合而成的饮品。手作奶茶强调新鲜制作，使用优质茶叶、鲜奶、手工珍珠等原料，口感丝滑醇厚，深受年轻人喜爱。</p>
    </div>
    
    <div class="detail-section">
        <h4>经典口味</h4>
        <p>珍珠奶茶：经典原味，黑糖珍珠Q弹<br>
           芋泥奶茶：绵密芋泥，香甜软糯<br>
           抹茶奶茶：清新抹茶，微苦回甘<br>
           水果茶：新鲜水果，清爽解腻</p>
    </div>
    
    <div class="detail-section">
        <h4>制作要点</h4>
        <p>茶叶要用85℃左右的热水冲泡，避免高温破坏茶香。牛奶建议使用全脂牛奶，口感更浓郁。珍珠要煮至透明，过冷水后口感更Q弹。糖度可根据个人口味调整。</p>
    </div>
